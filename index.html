<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive JavaScript Lab</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

<div class="max-w-5xl mx-auto p-4 md:p-8">

    <!-- Info -->
    <div class="bg-white shadow rounded-xl p-4 mb-6 text-sm text-gray-700">
        <h2 class="font-semibold text-lg text-gray-900">Name: FURAHA MUBARAKA</h2>
        <h3>Reg No: 25RP01602</h3>
    </div>

    <!-- Header -->
    <header class="bg-gray-800 text-white p-5 rounded-xl flex flex-col md:flex-row justify-between items-center shadow">
        <h1 id="mainTitle" class="text-xl md:text-2xl font-bold">
            My JavaScript Practice Page
        </h1>
        <button id="modifyTitle"
            class="mt-3 md:mt-0 bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-lg transition">
            Update Title
        </button>
    </header>

    <!-- Button Interaction -->
    <section class="bg-white shadow rounded-xl p-5 mt-6">
        <h2 class="text-lg font-semibold mb-3">Button Interaction</h2>

        <button id="pressBtn"
            class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg transition">
            Press Me
        </button>

        <p id="feedback" class="mt-3 text-gray-700"></p>
    </section>

    <!-- Calculator -->
    <section class="bg-white shadow rounded-xl p-5 mt-6">
        <h2 class="text-lg font-semibold mb-4">Math Tool</h2>

        <div class="flex flex-col md:flex-row gap-3 mb-4">
            <input type="number" id="firstValue"
                class="border p-2 rounded-lg w-full md:w-1/2"
                placeholder="First number">

            <input type="number" id="secondValue"
                class="border p-2 rounded-lg w-full md:w-1/2"
                placeholder="Second number">
        </div>

        <div class="flex flex-wrap gap-2 mb-4">
            <button data-op="add"
                class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">+</button>

            <button data-op="sub"
                class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">−</button>

            <button data-op="mul"
                class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">×</button>

            <button data-op="div"
                class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">÷</button>
        </div>

        <p id="calcOutput" class="font-semibold text-gray-800">
            Result will appear here
        </p>
    </section>

    <!-- Todo -->
    <section class="bg-white shadow rounded-xl p-5 mt-6">
        <h2 class="text-lg font-semibold mb-4">Daily Task Manager</h2>

        <div class="flex flex-col md:flex-row gap-3 mb-4">
            <input type="text" id="taskText"
                class="border p-2 rounded-lg w-full"
                placeholder="Enter new task">

            <button id="insertTask"
                class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg">
                Add Task
            </button>
        </div>

        <div id="taskContainer" class="space-y-2"></div>
    </section>

</div>

<script src="script.js"></script>

</body>
</html>
